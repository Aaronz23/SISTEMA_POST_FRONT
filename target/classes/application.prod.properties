spring.application.name=contactoelectrico
server.port=8082

#Configuration MongoDB
spring.data.mongodb.authentication-database=someValue
spring.data.mongodb.database=someValue
spring.data.mongodb.username=someValue
spring.data.mongodb.host=someValue
spring.data.mongodb.password=someValue
spring.data.mongodb.port=someValue


#Configuration Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

#Tama�o maximo de archivo para subida
server.tomcat.max-http-form-post-size=200MB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

#Configuration of email
spring.mail.host=someValue
spring.mail.port=someValue
spring.mail.username=someValue
app.admin.email=someValue
spring.mail.password=someValue
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


#Niveles de log
logging.level.net.tecgurus.controller.ExcelController=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#Configuration de archivo de log
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Configuracion vigencia cotizacion
quote.validity.days=3